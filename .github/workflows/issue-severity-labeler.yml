name: Issue Severity Labeler

on:
  issues:
    types: [opened, edited]

permissions:
  issues: write

jobs:
  label-issues:
    name: Label issues by severity
    runs-on: ubuntu-latest
    steps:
      - name: Create labels
        uses: actions/github-script@v7
        with:
          script: |
            const labels = [
              { name: 'severity-critical', color: 'd73a49', description: 'Critical - production outage or data loss' },
              { name: 'severity-high', color: 'ff6b6b', description: 'High - major functionality broken' },
              { name: 'severity-medium', color: 'ffd93d', description: 'Medium - notable issue affecting some users' },
              { name: 'severity-low', color: 'a2eeef', description: 'Low - minor issue or improvement' }
            ];

            for (const label of labels) {
              try {
                await github.rest.issues.getLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: label.name
                });
              } catch (error) {
                if (error.status === 404) {
                  await github.rest.issues.createLabel({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    ...label
                  });
                }
              }
            }

      - name: Add comment guiding severity labels
        uses: actions/github-script@v7
        if: github.event.action == 'opened'
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '**Please ensure this issue is labeled with appropriate severity:**\n- `severity-critical`: Production outage or data loss\n- `severity-high`: Major functionality broken\n- `severity-medium`: Notable issue affecting users\n- `severity-low`: Minor issue or improvement'
            })
